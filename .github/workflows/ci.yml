name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: medstorage
          POSTGRES_USER: medstorage
          POSTGRES_PASSWORD: medstorage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medstorage -d medstorage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build, run tests and verify coverage
        env:
          DB_NAME: medstorage
          DB_USER: medstorage
          DB_PASSWORD: medstorage
          DB_PORT: 5432
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: ./gradlew build jacocoTestReport jacocoTestCoverageVerification --no-daemon

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: build/reports/tests/test
