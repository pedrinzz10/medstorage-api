spring:
  application:
    name: MedStorage-api

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:medstorage}
    username: ${DB_USER:medstorage}
    password: ${DB_PASSWORD:medstorage}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-production-1234567890}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

mailtrap:
  api-token: ${MAILTRAP_API_TOKEN:}

app:
  mail:
    from: ${MAIL_FROM:no-reply@distribuidor.com}
    from-name: ${MAIL_FROM_NAME:MedStorage}
